name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        env:
          HUNTER_ROOT: ${{ github.workspace }}/.hunter
        run: cmake -S . -B _build -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build _build --parallel 2

      - name: Test
        run: cmake --build _build --target test -- ARGS=--verbose
